; =============================================================
;  WolfEngine — PlatformIO Configuration
; =============================================================

; -------------------------------------------------------------
;  BASE — shared by all environments
; -------------------------------------------------------------
[base]
build_unflags = 
    -std=gnu++11          ; remove default C++11 standard
build_flags =
    -std=gnu++20          ; C++20
    -Wl,--gc-sections     ; strip unused sections at link time
    -ffunction-sections   ; one section per function (enables gc-sections)
    -fdata-sections       ; one section per variable (enables gc-sections)

; -------------------------------------------------------------
;  BASE ESP32 — shared by all ESP32 targets
; -------------------------------------------------------------
[base_esp32]
platform = espressif32                     ; Espressif ESP32 platform
board = esp32dev                           ; generic ESP32 dev board
framework = espidf                         ; use ESP-IDF framework
monitor_speed = 115200                     ; serial baud rate
upload_speed = 921600                      ; fast flash upload
monitor_filters = esp32_exception_decoder  ; decode crash backtraces in monitor
extra_scripts = pre:cxx_only_flags.py      ; apply C++-only flags via custom script
build_flags =
    ${base.build_flags}                    ; inherit base flags
    -I src                                 ; project source root
    -Os                                    ; optimize for size
    -DPLATFORM_ESP32                       ; platform define for #ifdef guards
check_tool = cppcheck                      ; static analysis tool
check_flags =
    cppcheck: --skip-packages
    cppcheck: --suppress=missingInclude             ; headers resolved at build time
    cppcheck: --suppress=preprocessorErrorDirective ; ignore ESP-IDF macro errors
lib_deps =
    https://github.com/appsou/esp_lcd_st7735        ; ST7735 display driver

; -------------------------------------------------------------
;  BASE DESKTOP — shared by all desktop targets
; -------------------------------------------------------------
[base_desktop]
platform = native                      ; native host platform (Linux/Windows/Mac)
build_flags =
    ${base.build_flags}                ; inherit base flags
    -O2                                ; optimize for speed
    -DPLATFORM_DESKTOP                 ; platform define for #ifdef guards
    -DWE_PLATFORM_SDL                  ; enable SDL rendering backend
    -DSDL_MAIN_HANDLED                 ; SDL won't override main()
    -I desktop                         ; desktop-specific headers
    -I src                             ; project source root
build_src_filter = +<desktop/**> +<src/WolfEngine/**>  ; include desktop sources

; -------------------------------------------------------------
;  ENVIRONMENTS
; -------------------------------------------------------------
[env:esp32dev]
extends = base_esp32                     ; inherit all ESP32 base settings
build_flags = ${base_esp32.build_flags}

[env:desktop]
extends = base_desktop                   ; inherit all desktop base settings
build_flags =
    ${base_desktop.build_flags}
    -lSDL3                               ; link SDL3 library
